providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic/
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  
  bolt:
    address: ":7687"

certificatesResolvers:
  letsencrypt:
    acme:
      email: john.doe@example.com
      storage: /letsencrypt/thedomainyouwanttohostthisrepository.com.json
      tlsChallenge: {}
      # Default CA server is Let's Encrypt Production
      caServer: https://acme-v02.api.letsencrypt.org/directory

log:
  level: INFO
  # level: DEBUG
